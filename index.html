<!DOCTYPE html>
<html>
<head>
    <title>Photo Dance AI</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            background:#f2f2f2;
        }
        h1{
            color:#333;
            margin-top:40px;
        }
        input{
            padding:10px;
            margin-top:20px;
        }
        button{
            padding:12px 25px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }
        button:hover{
            background:#0056b3;
        }
        img{
            margin-top:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }
        video{
            margin-top:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>
    <h1>Turn Photo Into Dance</h1>

    <input type="file" id="upload">
    <br><br>
    <img id="preview" width="300">
    <br><br>
    <button id="generateBtn">Generate Dance</button>
    <br><br>
    <p id="loading" style="display:none; font-size:20px; color:green;">
        Processing AI Dance Video...
    </p>
    <video id="danceVideo" width="400" controls style="display:none;"></video>
    <br><br>
    <a id="downloadLink" href="#" download>
        <button>Download Dance Video</button>
    </a>

    <script>
        // Photo Preview
        document.getElementById("upload").onchange = function(event){
            let file = event.target.files[0];
            let url = URL.createObjectURL(file);
            document.getElementById("preview").src = url;
        }

        // AI API Call
        async function generateDanceAI(file){
            const formData = new FormData();
            formData.append("image", file);

            const response = await fetch("https://api.runwayml.com/v1/dance-generator", {
                method: "POST",
                headers: {
                    "Authorization": "key_ea00308946dd8d2996fb2e3f4fb4f31a907a68b66e4b1c0aa2b45bc9449fb216554bbe0d66738fe67f040fcd6faaa238aa6558a49ec51c423278d263097580ca"
                },
                body: formData
            });

            const data = await response.json();
            return data.video_url; // API سے video URL آئے گا
        }

        // Generate Button
        document.getElementById("generateBtn").onclick = async function(){
            let file = document.getElementById("upload").files[0];
            if(!file){
                alert("Please upload a photo first!");
                return;
            }

            document.getElementById("loading").style.display = "block";
            document.getElementById("danceVideo").style.display = "none";

            try{
                const videoURL = await generateDanceAI(file);
                document.getElementById("loading").style.display = "none";
                const videoEl = document.getElementById("danceVideo");
                videoEl.src = videoURL;
                videoEl.style.display = "block";

                document.getElementById("downloadLink").href = videoURL;
            }catch(err){
                alert("Error generating dance video. Please try again!");
                document.getElementById("loading").style.display = "none";
            }
        }
    </script>
</body>
</html>
